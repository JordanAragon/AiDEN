    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styleindex.css">
        <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
        <title>Registro - AiDEN</title>
    </head>
    <body>
        <main class="form xs_12 s_12 m_12 l_12 xl_12">
            <section class="formulario xs_12 s_12 m_12 l_6 xl_6">
                <header class="titulo xs_12 s_12 m_11">
                    <h1>¡Empecemos!</h1>
                </header>

                <form action="" class="register xs_12 s_12 m_11 xl_12">
                    <fieldset class="datos xs_11 s_11 m_11">
                        <label for="Nombre">Nombre</label>
                        <input class="itext xs_11 s_11 m_12 l_11 xl_11" id="Nombre" type="text" placeholder="Ingrese su nombre">

                        <label for="apellido">Apellidos</label>
                        <input class="itext xs_11 s_11 m_12 l_11 xl_11" id="apellido" type="text" placeholder="Ingrese sus apellidos">

                        <label for="Gmail">Correo Electrónico</label>
                        <input class="itext xs_11 s_11 m_12 l_11 xl_11" id="Gmail" type="email" placeholder="Ingrese su correo electrónico">

                        <label for="Pass">Contraseña</label>
                        <input class="itext xs_11 s_11 m_12 l_11 xl_11" id="Pass" type="password" placeholder="Cree una nueva contraseña">

                        <label for="rol">Roles</label>
                        <select class="xs_8 s_8 m_6 l_6 xl_8" id="rol" name="rol">
                            <option value="">Seleccione su rol</option>
                            <option value="dueño">Propietario</option>
                            <option value="administrador">Administrador</option>
                            <option value="operario">Operario</option>
                        </select>
                    </fieldset>

                    <fieldset class="terminos xs_8 s_4 m_4 l_5">
                        <input type="checkbox" id="check-term">
                        <label for="check-term" class="textterm" id="check-term">Acepto los términos y Condiciones</label>
                    </fieldset> 

                    <section class="registroB">
                        <input class="boton_registro xs_11 s_11 m_12 l_11 xl_11" type="submit" value="Regístrate">
                    </section>
                </form>
                    
                <section class="redireccionLogin xs_12 s_12 m_12 l_12 xl_12">
                    <p>¿Tienes una cuenta? <a href="#">Inicia Sesión</a></p>
                </section>
            </section>
            <article class="image l_6 xl_6">
            
            </article>
        </main>
    </body>
    </html>
